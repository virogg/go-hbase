name: go-hbase-dev

# HBase 2.5 standalone dev cluster.
# - One container runs Master + RegionServer + embedded ZooKeeper in a single JVM (HBase standalone mode).
# - Image is built locally from ./hbase/Dockerfile, pinned to HBase ${HBASE_VERSION}.
# - The host bind-mount ./coproc-jars/ is where the integration test drops the example coproc-jar before invoking `disable/alterTable/enable`.

services:
  hbase:
    build:
      context: ./hbase
      args:
        HBASE_VERSION: "${HBASE_VERSION:-2.5.11}"
        HBASE_SHA512: "${HBASE_SHA512:-BAD94B693C2F3013F91FB50BF8678D48C749815A8CA335531E85C0B62BFC18D34DF253A43B50AA66B7ED5C1FF379E8EA0213B4A6F21441F93DD83EB21DEC473C}"
    image: "go-hbase/hbase-dev:${HBASE_VERSION:-2.5.11}"
    container_name: go-hbase-dev
    hostname: hbase-dev
    ports:
      - "16010:16010"   # master web UI
      - "16030:16030"   # regionserver web UI
      - "2181:2182"     # zookeeper client
      - "16000:16000"   # master RPC
      - "16020:16020"   # regionserver RPC
    volumes:
      - ./coproc-jars:/coproc-jars
    environment:
      HBASECOP_MASTER_COPROC_CLASS: "${HBASECOP_MASTER_COPROC_CLASS:-}"
      HBASECOP_MASTER_COPROC_JAR: "${HBASECOP_MASTER_COPROC_JAR:-}"
      HBASECOP_POLICY_BLOCKED_PREFIX: "${HBASECOP_POLICY_BLOCKED_PREFIX:-}"
      HBASECOP_RS_COPROC_CLASS: "${HBASECOP_RS_COPROC_CLASS:-}"
      HBASECOP_RS_COPROC_JAR: "${HBASECOP_RS_COPROC_JAR:-}"
      HBASECOP_RS_POLICY_VETO_WAL_ROLL: "${HBASECOP_RS_POLICY_VETO_WAL_ROLL:-}"
      HBASECOP_WAL_COPROC_CLASS: "${HBASECOP_WAL_COPROC_CLASS:-}"
      HBASECOP_WAL_COPROC_JAR: "${HBASECOP_WAL_COPROC_JAR:-}"
      HBASECOP_ENABLE_ACL: "${HBASECOP_ENABLE_ACL:-}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS -o /dev/null http://localhost:16010/master-status || exit 1"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
