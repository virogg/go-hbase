name: go-hbase-dev

# T26: HBase 2.5 standalone dev cluster.
# - One container runs Master + RegionServer + embedded ZooKeeper in a single
#   JVM (HBase standalone mode). Sufficient for coproc integration tests.
# - Image is built locally from ./hbase/Dockerfile, pinned to HBase ${HBASE_VERSION}.
# - The host bind-mount ./coproc-jars/ is where the integration test (T27)
#   drops the example coproc-jar before invoking `disable/alterTable/enable`.

services:
  hbase:
    build:
      context: ./hbase
      args:
        HBASE_VERSION: "${HBASE_VERSION:-2.5.11}"
    image: "go-hbase/hbase-dev:${HBASE_VERSION:-2.5.11}"
    container_name: go-hbase-dev
    hostname: hbase-dev
    # We use explicit port forwards (not network_mode=host) so this works under
    # Docker Desktop, where host-mode shares the Hyper-V VM's network namespace
    # instead of the WSL2 host's. The RegionServer advertises itself as
    # `localhost` (see hbase-site.xml `hbase.*.hostname`), so the host-side
    # client can connect back via these mapped ports.
    ports:
      - "16010:16010"   # master web UI
      - "16030:16030"   # regionserver web UI
      - "2181:2181"     # zookeeper client
      - "16000:16000"   # master RPC
      - "16020:16020"   # regionserver RPC
    volumes:
      - ./coproc-jars:/coproc-jars
    # T51: master coprocessors must be registered cluster-wide at startup.
    # These pass through from the host shell (empty for every non-master IT,
    # so the entrypoint's injection is a no-op); `make test-integration-master`
    # exports them before `docker compose up`.
    environment:
      HBASECOP_MASTER_COPROC_CLASS: "${HBASECOP_MASTER_COPROC_CLASS:-}"
      HBASECOP_MASTER_COPROC_JAR: "${HBASECOP_MASTER_COPROC_JAR:-}"
      HBASECOP_POLICY_BLOCKED_PREFIX: "${HBASECOP_POLICY_BLOCKED_PREFIX:-}"
      # T52: region-server coprocessor registration; `make test-integration-rs`
      # exports these, empty (no-op) for every other IT.
      HBASECOP_RS_COPROC_CLASS: "${HBASECOP_RS_COPROC_CLASS:-}"
      HBASECOP_RS_COPROC_JAR: "${HBASECOP_RS_COPROC_JAR:-}"
      HBASECOP_RS_POLICY_VETO_WAL_ROLL: "${HBASECOP_RS_POLICY_VETO_WAL_ROLL:-}"
      # T82: WAL coprocessor registration; `make bench-wal` exports these for
      # its coproc leg, empty (no-op) everywhere else.
      HBASECOP_WAL_COPROC_CLASS: "${HBASECOP_WAL_COPROC_CLASS:-}"
      HBASECOP_WAL_COPROC_JAR: "${HBASECOP_WAL_COPROC_JAR:-}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS -o /dev/null http://localhost:16010/master-status || exit 1"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
