syntax = "proto2";

package virogg.hbasecop.v1;

option java_package = "com.virogg.hbasecop.bridge.endpoint.pb";
option java_multiple_files = true;
option java_outer_classname = "EndpointProto";
option java_generic_services = true;
option optimize_for = SPEED;

message GoEndpointRequest {
  optional string method = 1;
  optional bytes payload = 2;
}

message GoEndpointResponse {
  optional bytes payload = 1;
  optional string error = 2;
}

service GoEndpointService {
  rpc Call (GoEndpointRequest) returns (GoEndpointResponse);
}
