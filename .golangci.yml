# golangci-lint v2 configuration.
# Linter set per SPEC.md §6 / tasks/plan.md T02.

version: "2"

run:
  timeout: 5m
  # Match go.mod's toolchain so the linter reasons about the language/stdlib
  # the build actually uses (was "1.22", two minors behind go.mod's 1.24).
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    # gosimple (SPEC §6) was folded into staticcheck in golangci-lint v2;
    # staticcheck below carries its checks.
    - staticcheck
    - unused

  settings:
    revive:
      rules:
        # Doc comments on exported symbols and packages are intentionally not
        # required; the rest of revive's default rules stay on.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    paths:
      - tools/
    rules:
      # Generated protobuf has its own conventions.
      - path: ".*\\.pb\\.go$"
        linters: [revive, staticcheck, errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
