syntax = "proto3";

package virogg.hbasecop.v1;

option go_package = "github.com/virogg/go-hbase/internal/wire/wirepb";
option java_package = "com.virogg.hbasecop.bridge.wire.pb";
option java_multiple_files = true;
option java_outer_classname = "WireProto";

// FrameHeader is the routing metadata carried on every frame.
//
//   req_id      - caller-assigned request id; correlates Request ↔ Response (and Error responses). Heartbeats carry req_id=0.
//   region_id   - HBase region identifier for routing on the Go side.
//   hook_id     - Observer-method discriminator.
//   chunk_idx   - 0-based index of this chunk in a multi-chunk message.
//   chunk_total - total number of chunks (>=1). =1 for single-chunk.
message FrameHeader {
  uint64 req_id = 1;
  uint32 region_id = 2;
  uint32 hook_id = 3;
  uint32 chunk_idx = 4;
  uint32 chunk_total = 5;
}

message Request {
  bytes hook_ctx = 1;
}

message Response {
  bytes hook_resp = 1;
}

message Heartbeat {
  uint64 monotonic_nanos = 1;
}

message Error {
  uint32 code = 1;
  string message = 2;
}

message Shutdown {
  string reason = 1;
}

message Log {
  enum Level {
    LEVEL_UNSPECIFIED = 0;
    DEBUG = 1;
    INFO = 2;
    WARN = 3;
    ERROR = 4;
  }
  Level level = 1;
  string message = 2;
}

message EndpointInvoke {
  string service = 1;
  string method = 2;
  bytes payload = 3;
}

message EndpointResult {
  bytes payload = 1;
}

message RpcRequest {
  enum Op {
    OP_UNSPECIFIED = 0;
    SCAN_OPEN = 1;
    SCAN_NEXT = 2;
    SCAN_CLOSE = 3;
    GET = 4;
    MUTATE = 5;
  }
  uint64 call_id = 1;
  Op op = 2;
  bytes op_payload = 3;
  uint64 scanner_id = 4;
}

message RpcResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    OK = 1;
    ERROR = 2;
  }
  Status status = 1;
  bytes payload = 2;
  uint64 scanner_id = 3;
  bool has_more = 4;
}

message Frame {
  FrameHeader header = 1;
  oneof payload {
    Request request = 2;
    Response response = 3;
    Heartbeat heartbeat = 4;
    Error error = 5;
    Shutdown shutdown = 6;
    Log log = 7;
    EndpointInvoke endpoint_invoke = 8;
    EndpointResult endpoint_result = 9;
    RpcRequest rpc_request = 10;
    RpcResponse rpc_response = 11;
  }
}
