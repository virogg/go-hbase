syntax = "proto2";
package virogg.hbasecop.hbase.v1;

option java_package = "com.virogg.hbasecop.hbase.v1";
option java_outer_classname = "CellProtos";
option java_generate_equals_and_hash = true;
option go_package = "github.com/virogg/go-hbase/internal/wire/hbasepb";
option optimize_for = SPEED;

enum CellType {
    MINIMUM = 0;
    PUT = 4;

    DELETE = 8;
    DELETE_FAMILY_VERSION = 10;
    DELETE_COLUMN = 12;
    DELETE_FAMILY = 14;

    MAXIMUM = 255;
}

message Cell {
  optional bytes row = 1;
  optional bytes family = 2;
  optional bytes qualifier = 3;
  optional uint64 timestamp = 4;
  optional CellType cell_type = 5;
  optional bytes value = 6;
  optional bytes tags = 7;
}

message KeyValue {
  required bytes row = 1;
  required bytes family = 2;
  required bytes qualifier = 3;
  optional uint64 timestamp = 4;
  optional CellType key_type = 5;
  optional bytes value = 6;
  optional bytes tags = 7;
}
