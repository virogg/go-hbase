// This file contains protocol buffers that are used for Client service.
syntax = "proto2";
package virogg.hbasecop.hbase.v1;

option java_package = "com.virogg.hbasecop.hbase.v1";
option java_outer_classname = "ClientProtos";
option java_generate_equals_and_hash = true;
option go_package = "github.com/virogg/go-hbase/internal/wire/hbasepb";
option optimize_for = SPEED;

import "hbase/Cell.proto";
import "hbase/HBase.proto";

/** Read consistency level for Get/Scan. */
enum Consistency {
  STRONG = 0;
  TIMELINE = 1;
}

/** Container for a list of column qualifier names of a family. */
message Column {
  required bytes family = 1;
  repeated bytes qualifier = 2;
}

/**
 * Filter envelope. Carries the upstream-class name plus the filter's
 * own self-serialization (via Filter.toByteArray()); reconstruction on
 * the Go side is opaque until a per-filter mapper is added.
 */
message Filter {
  required string name = 1;
  optional bytes serialized_filter = 2;
}

/** Get operation. */
message Get {
  required bytes row = 1;
  repeated Column column = 2;
  repeated NameBytesPair attribute = 3;
  optional Filter filter = 4;
  optional TimeRange time_range = 5;
  optional uint32 max_versions = 6 [default = 1];
  optional bool cache_blocks = 7 [default = true];
  optional uint32 store_limit = 8;
  optional uint32 store_offset = 9;
  optional bool existence_only = 10 [default = false];
  optional Consistency consistency = 12 [default = STRONG];
  repeated ColumnFamilyTimeRange cf_time_range = 13;
  optional bool load_column_families_on_demand = 14;
}

/**
 * Result of a read. Cells either land in `cell` directly or are
 * shipped out-of-band with `associated_cell_count`; we always inline
 * via `cell` because the shmem ring carries the whole frame anyway.
 */
message Result {
  repeated Cell cell = 1;
  optional int32 associated_cell_count = 2;
  optional bool exists = 3;
  optional bool stale = 4 [default = false];
  optional bool partial = 5 [default = false];
}

/** Cursor for resumable scans (see Scan.need_cursor_result). */
message Cursor {
  optional bytes row = 1;
}

/** Scan operation. */
message Scan {
  repeated Column column = 1;
  repeated NameBytesPair attribute = 2;
  optional bytes start_row = 3;
  optional bytes stop_row = 4;
  optional Filter filter = 5;
  optional TimeRange time_range = 6;
  optional uint32 max_versions = 7 [default = 1];
  optional bool cache_blocks = 8 [default = true];
  optional uint32 batch_size = 9;
  optional uint64 max_result_size = 10;
  optional uint32 store_limit = 11;
  optional uint32 store_offset = 12;
  optional bool load_column_families_on_demand = 13;
  optional bool small = 14 [deprecated = true];
  optional bool reversed = 15 [default = false];
  optional Consistency consistency = 16 [default = STRONG];
  optional uint32 caching = 17;
  optional bool allow_partial_results = 18;
  repeated ColumnFamilyTimeRange cf_time_range = 19;
  optional uint64 mvcc_read_point = 20 [default = 0];
  optional bool include_start_row = 21 [default = true];
  optional bool include_stop_row = 22 [default = false];
  enum ReadType {
    DEFAULT = 0;
    STREAM = 1;
    PREAD = 2;
  }
  optional ReadType read_type = 23 [default = DEFAULT];
  optional bool need_cursor_result = 24 [default = false];
}

/**
 * A specific Mutate operation. The Mutation is wrapped in MutationProto.
 *
 * The 'cell' field is deliberately left out of this slim vendor — HBase
 * passes Cells out-of-band when associated_cell_count > 0; the in-band
 * column_value path covers everything Phase 2 (T22+) needs.
 */
message MutationProto {
  optional bytes row = 1;
  optional MutationType mutate_type = 2;
  repeated ColumnValue column_value = 3;
  optional uint64 timestamp = 4;
  repeated NameBytesPair attribute = 5;
  optional Durability durability = 6 [default = USE_DEFAULT];

  optional TimeRange time_range = 7;
  optional int32 associated_cell_count = 8;

  optional uint64 nonce = 9;

  enum Durability {
    USE_DEFAULT  = 0;
    SKIP_WAL     = 1;
    ASYNC_WAL    = 2;
    SYNC_WAL     = 3;
    FSYNC_WAL    = 4;
  }

  enum MutationType {
    APPEND = 0;
    INCREMENT = 1;
    PUT = 2;
    DELETE = 3;
  }

  enum DeleteType {
    DELETE_ONE_VERSION = 0;
    DELETE_MULTIPLE_VERSIONS = 1;
    DELETE_FAMILY = 2;
    DELETE_FAMILY_VERSION = 3;
  }

  message ColumnValue {
    required bytes family = 1;
    repeated QualifierValue qualifier_value = 2;

    message QualifierValue {
      optional bytes qualifier = 1;
      optional bytes value = 2;
      optional uint64 timestamp = 3;
      optional DeleteType delete_type = 4;
      optional bytes tags = 5;
    }
  }
}
