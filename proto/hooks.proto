message PreCheckAndPutRequest {
  HookContext ctx = 1;
  bytes row = 2;
  bytes family = 3;
  bytes qualifier = 4;
  int32 compare_op = 5;
  virogg.hbasecop.hbase.v1.Comparator comparator = 6;
  virogg.hbasecop.hbase.v1.MutationProto put = 7;
  bool input_result = 8;
}
message PostCheckAndPutRequest {
  HookContext ctx = 1;
  bytes row = 2;
  bytes family = 3;
  bytes qualifier = 4;
  int32 compare_op = 5;
  virogg.hbasecop.hbase.v1.Comparator comparator = 6;
  virogg.hbasecop.hbase.v1.MutationProto put = 7;
  bool input_result = 8;
}
