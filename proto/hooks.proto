message HookContext {
  virogg.hbasecop.hbase.v1.TableName table_name = 1;
  bytes region_name = 2;
  uint64 request_id = 3;
}

message HookError {
  uint32 code = 1;
  string message = 2;
}

message HookResponse {
  bool bypass = 1;
  HookError error = 2;
  repeated uint32 blocked_indices = 3;
  repeated virogg.hbasecop.hbase.v1.Cell result = 4;
}

message PrePutRequest {
  HookContext ctx = 1;
  virogg.hbasecop.hbase.v1.MutationProto mutation = 2;
}

message PostPutRequest {
  HookContext ctx = 1;
  virogg.hbasecop.hbase.v1.MutationProto mutation = 2;
}

message PreOpenRequest { HookContext ctx = 1; }
message PostOpenRequest { HookContext ctx = 1; }
message PreCloseRequest {
  HookContext ctx = 1;
  bool abort_requested = 2;
}
message PostCloseRequest {
  HookContext ctx = 1;
  bool abort_requested = 2;
}

message PreFlushRequest { HookContext ctx = 1; }
message PreFlushScannerOpenRequest { HookContext ctx = 1; }
message PostFlushRequest { HookContext ctx = 1; }

message PreMemStoreCompactionRequest { HookContext ctx = 1; }
message PreMemStoreCompactionCompactScannerOpenRequest { HookContext ctx = 1; }
message PreMemStoreCompactionCompactRequest { HookContext ctx = 1; }
message PostMemStoreCompactionRequest { HookContext ctx = 1; }

message StoreFilePathProto {
  string path = 1;
  uint64 size_bytes = 2;
}

message CompactionRequestSummary {
  bool is_major = 1;
  bool is_all_files = 2;
  uint64 size = 3;
  uint64 selection_time = 4;
}

message PreCompactSelectionRequest {
  HookContext ctx = 1;
  bytes column_family = 2;
  repeated StoreFilePathProto candidate = 3;
}
message PostCompactSelectionRequest {
  HookContext ctx = 1;
  bytes column_family = 2;
  repeated StoreFilePathProto selected = 3;
  CompactionRequestSummary request = 4;
}
message PreCompactScannerOpenRequest {
  HookContext ctx = 1;
  bytes column_family = 2;
  int32 scan_type = 3;
  CompactionRequestSummary request = 4;
}
message PreCompactRequest {
  HookContext ctx = 1;
  bytes column_family = 2;
  int32 scan_type = 3;
  CompactionRequestSummary request = 4;
}
message PostCompactRequest {
  HookContext ctx = 1;
  bytes column_family = 2;
  StoreFilePathProto result_file = 3;
  CompactionRequestSummary request = 4;
}

