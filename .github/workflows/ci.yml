name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    name: Repo structure
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify repo skeleton (SPEC.md §4)
        run: ./tools/check-structure.sh

  license:
    name: License headers
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Apache 2.0 SPDX header check
        run: ./tools/license-header.sh --check

  go:
    name: Go (lint + build + test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.10.1
          args: --timeout=5m
      - name: go build
        run: make go-build
      - name: go test (race)
        run: make go-test

  java:
    name: Java (lint + test + jacoco)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: spotless:check
        run: make java-lint
      - name: mvn verify
        run: make java-test
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: ignore
          retention-days: 7

  contract:
    name: Contract (cross-language)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Regenerate the golden .bin corpus from fixtures.tsv and assert no
      # drift versus the committed bytes. Combined with the Java and Go
      # decoder tests that consume the same corpus, this proves bit-for-bit
      # encode↔decode parity between the two language sides.
      - name: Regenerate golden corpus
        run: go run ./cmd/wire-golden -out test/golden/wire/v1
      - name: Verify corpus is reproducible
        run: git diff --exit-code test/golden/wire/v1
